<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="URL→Claude">
<title>URL → Claude</title>
<link rel="manifest" href="/upload-urls/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f0f;
    --fg: #f0ebe3;
    --accent: #ff4d1c;
    --accent2: #ffd166;
    --dim: #2a2a2a;
    --dim2: #1a1a1a;
    --text-dim: #666;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,77,28,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,77,28,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .hd { margin-bottom: 40px; }
  .hd-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .hd-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--fg);
  }
  .hd-title span { color: var(--accent); }
  .hd-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  .url-box {
    background: var(--dim2);
    border: 1px solid var(--dim);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 12px;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .url-box::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.3s ease;
    transform-origin: top;
  }

  .url-box.has-url::before { transform: scaleY(1); }
  .url-box.has-url { border-color: #333; }

  .url-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .url-text {
    font-size: 12px;
    color: var(--fg);
    word-break: break-all;
    line-height: 1.5;
    opacity: 0.9;
  }

  .url-placeholder {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.6;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  input[type="url"] {
    flex: 1;
    background: var(--dim2);
    border: 1px solid var(--dim);
    border-radius: 4px;
    padding: 12px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--fg);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="url"]::placeholder { color: var(--text-dim); }
  input[type="url"]:focus { border-color: var(--accent); }

  .btn-set {
    background: var(--dim);
    color: var(--fg);
    border: none;
    border-radius: 4px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-set:hover { background: #333; }

  .btn-copy {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 10px;
  }
  .btn-copy:active { transform: scale(0.98); }
  .btn-copy:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-open {
    width: 100%;
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--dim);
    border-radius: 4px;
    padding: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
    display: block;
    text-align: center;
    letter-spacing: 0.05em;
    transition: border-color 0.15s;
  }
  .btn-open:hover { border-color: var(--fg); }

  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent2);
    color: #000;
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.25s ease;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .history {
    margin-top: 28px;
    border-top: 1px solid var(--dim);
    padding-top: 16px;
  }
  .history-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .history-item:hover { opacity: 0.7; }
  .history-item:last-child { border-bottom: none; }
  .hi-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .hi-url { flex: 1; font-size: 11px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hi-copy { font-size: 10px; color: var(--accent); flex-shrink: 0; }
</style>
</head>
<body>
<div class="wrap">

  <div class="hd">
    <div class="hd-label">URL Sharer</div>
    <div class="hd-title">URL<br><span>→</span><br>CLAUDE</div>
    <div class="hd-sub">공유받은 URL을 Claude 채팅에 붙여넣기</div>
  </div>

  <div class="url-box" id="urlBox">
    <div class="url-label">감지된 URL</div>
    <div class="url-placeholder" id="urlPlaceholder">공유하기로 전달하거나<br>아래에 직접 입력하세요</div>
    <div class="url-text" id="urlText" style="display:none"></div>
  </div>

  <div class="input-row">
    <input type="url" id="urlInput" placeholder="https://..." />
    <button class="btn-set" onclick="setUrl()">설정</button>
  </div>

  <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()" disabled>
    클립보드에 복사
  </button>
  <a href="https://claude.ai" target="_blank" class="btn-open">
    Claude 채팅 열기 →
  </a>

  <div class="history" id="historySection" style="display:none">
    <div class="history-label">최근 기록</div>
    <div id="historyList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let currentUrl = '';
let hist = JSON.parse(localStorage.getItem('url_history') || '[]');

function init() {
  const params = new URLSearchParams(window.location.search);
  const shared = params.get('url') || params.get('text') || params.get('title');

  if (shared) {
    const match = shared.match(/https?:\/\/[^\s]+/);
    applyUrl(match ? match[0] : shared);
    window.history.replaceState({}, '', window.location.pathname);
  }

  renderHistory();
}

function applyUrl(url) {
  currentUrl = url.trim();
  document.getElementById('urlPlaceholder').style.display = 'none';
  document.getElementById('urlText').style.display = 'block';
  document.getElementById('urlText').textContent = currentUrl;
  document.getElementById('urlBox').classList.add('has-url');
  document.getElementById('copyBtn').disabled = false;
  document.getElementById('urlInput').value = currentUrl;
}

function setUrl() {
  const val = document.getElementById('urlInput').value.trim();
  if (val) applyUrl(val);
}

async function copyToClipboard() {
  if (!currentUrl) return;
  try {
    await navigator.clipboard.writeText(currentUrl);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = currentUrl;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  showToast('✓ 복사됨! Claude에 붙여넣기 하세요');
  saveHistory(currentUrl);

  const btn = document.getElementById('copyBtn');
  btn.textContent = '복사 완료 ✓';
  btn.style.background = '#22c55e';
  setTimeout(() => { btn.textContent = '클립보드에 복사'; btn.style.background = ''; }, 2000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function saveHistory(url) {
  hist = [url, ...hist.filter(u => u !== url)].slice(0, 5);
  localStorage.setItem('url_history', JSON.stringify(hist));
  renderHistory();
}

function renderHistory() {
  if (!hist.length) return;
  document.getElementById('historySection').style.display = 'block';
  document.getElementById('historyList').innerHTML = hist.map(url => `
    <div class="history-item" onclick="applyUrl(${JSON.stringify(url)})">
      <div class="hi-dot"></div>
      <div class="hi-url">${url}</div>
      <div class="hi-copy">선택</div>
    </div>
  `).join('');
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') setUrl();
});

init();
</script>
</body>
</html>
