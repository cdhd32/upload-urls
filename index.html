<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="URL→Claude">
<title>URL → Claude</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<!-- PWA Manifest inline -->
<script>
const manifest = {
  name: "URL to Claude",
  short_name: "URL→Claude",
  description: "URL을 Claude 채팅으로 공유",
  start_url: ".",
  display: "standalone",
  background_color: "#0f0f0f",
  theme_color: "#0f0f0f",
  share_target: {
    action: "/",
    method: "GET",
    params: { url: "url", text: "text", title: "title" }
  },
  icons: [{
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230f0f0f'/><text y='.9em' font-size='80' x='10'>🔗</text></svg>",
    sizes: "any",
    type: "image/svg+xml"
  }]
};
const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestUrl = URL.createObjectURL(blob);
document.write(`<link rel="manifest" href="/url-to-claude/manifest.json">`);
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f0f;
    --fg: #f0ebe3;
    --accent: #ff4d1c;
    --accent2: #ffd166;
    --dim: #2a2a2a;
    --dim2: #1a1a1a;
    --text-dim: #666;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,77,28,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,77,28,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .hd {
    margin-bottom: 40px;
  }

  .hd-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .hd-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 0.9;
    letter-spacing: 0.02em;
    color: var(--fg);
  }

  .hd-title span {
    color: var(--accent);
  }

  .hd-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  /* URL display box */
  .url-box {
    background: var(--dim2);
    border: 1px solid var(--dim);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 12px;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .url-box::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.3s ease;
    transform-origin: top;
  }

  .url-box.has-url::before {
    transform: scaleY(1);
  }

  .url-box.has-url {
    border-color: #333;
  }

  .url-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .url-text {
    font-size: 12px;
    color: var(--fg);
    word-break: break-all;
    line-height: 1.5;
    opacity: 0.9;
  }

  .url-placeholder {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.6;
  }

  /* Manual input */
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  input[type="url"] {
    flex: 1;
    background: var(--dim2);
    border: 1px solid var(--dim);
    border-radius: 4px;
    padding: 12px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--fg);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  input[type="url"]::placeholder { color: var(--text-dim); }
  input[type="url"]:focus { border-color: var(--accent); }

  .btn-set {
    background: var(--dim);
    color: var(--fg);
    border: none;
    border-radius: 4px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-set:hover { background: #333; }

  /* Main button */
  .btn-copy {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .btn-copy::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }

  .btn-copy:hover::after { background: rgba(255,255,255,0.08); }
  .btn-copy:active { transform: scale(0.98); }
  .btn-copy:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-open {
    width: 100%;
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--dim);
    border-radius: 4px;
    padding: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    display: block;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .btn-open:hover { border-color: var(--fg); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent2);
    color: #000;
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.25s ease;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* History */
  .history {
    margin-top: 28px;
    border-top: 1px solid var(--dim);
    padding-top: 16px;
  }

  .history-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .history-item:hover { opacity: 0.7; }
  .history-item:last-child { border-bottom: none; }

  .hi-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .hi-url {
    flex: 1;
    font-size: 11px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .hi-copy {
    font-size: 10px;
    color: var(--accent);
    flex-shrink: 0;
  }

  /* Install hint */
  .install-hint {
    margin-top: 20px;
    padding: 12px;
    border: 1px dashed #2a2a2a;
    border-radius: 4px;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.6;
    letter-spacing: 0.02em;
    display: none;
  }

  .install-hint.show { display: block; }
  .install-hint strong { color: var(--fg); }
</style>
</head>
<body>
<div class="wrap">

  <div class="hd">
    <div class="hd-label">URL Sharer</div>
    <div class="hd-title">URL<br><span>→</span><br>CLAUDE</div>
    <div class="hd-sub">공유받은 URL을 Claude 채팅에 붙여넣기</div>
  </div>

  <!-- URL Display -->
  <div class="url-box" id="urlBox">
    <div class="url-label">감지된 URL</div>
    <div class="url-placeholder" id="urlPlaceholder">
      공유하기로 전달하거나<br>아래에 직접 입력하세요
    </div>
    <div class="url-text" id="urlText" style="display:none"></div>
  </div>

  <!-- Manual input -->
  <div class="input-row">
    <input type="url" id="urlInput" placeholder="https://..." />
    <button class="btn-set" onclick="setUrl()">설정</button>
  </div>

  <!-- Actions -->
  <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()" disabled>
    클립보드에 복사
  </button>
  <a href="https://claude.ai" target="_blank" class="btn-open" id="claudeLink">
    Claude 채팅 열기 →
  </a>

  <!-- History -->
  <div class="history" id="historySection" style="display:none">
    <div class="history-label">최근 기록</div>
    <div id="historyList"></div>
  </div>

  <!-- Install hint -->
  <div class="install-hint" id="installHint">
    💡 <strong>홈 화면에 추가</strong>하면 공유 타겟으로 등록돼요.<br>
    Safari → 공유 버튼 → 홈 화면에 추가
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let currentUrl = '';
let history = JSON.parse(localStorage.getItem('url_history') || '[]');

// Check URL params (from share target or manual)
function init() {
  const params = new URLSearchParams(window.location.search);
  const sharedUrl = params.get('url') || params.get('text') || params.get('title');

  if (sharedUrl) {
    // Extract URL if mixed with text
    const urlMatch = sharedUrl.match(/https?:\/\/[^\s]+/);
    if (urlMatch) {
      applyUrl(urlMatch[0]);
    } else {
      applyUrl(sharedUrl);
    }
    // Clean URL bar
    window.history.replaceState({}, '', window.location.pathname);
  }

  renderHistory();

  // Show install hint on mobile Safari
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  const isMobile = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if (isMobile && isSafari && !isStandalone) {
    document.getElementById('installHint').classList.add('show');
  }
}

function applyUrl(url) {
  currentUrl = url.trim();
  document.getElementById('urlPlaceholder').style.display = 'none';
  document.getElementById('urlText').style.display = 'block';
  document.getElementById('urlText').textContent = currentUrl;
  document.getElementById('urlBox').classList.add('has-url');
  document.getElementById('copyBtn').disabled = false;
  document.getElementById('urlInput').value = currentUrl;
}

function setUrl() {
  const val = document.getElementById('urlInput').value.trim();
  if (!val) return;
  applyUrl(val);
}

async function copyToClipboard() {
  if (!currentUrl) return;

  try {
    await navigator.clipboard.writeText(currentUrl);
    showToast('✓ 복사됨! Claude에 붙여넣기 하세요');
    saveHistory(currentUrl);
    renderHistory();

    // Button feedback
    const btn = document.getElementById('copyBtn');
    const orig = btn.textContent;
    btn.textContent = '복사 완료 ✓';
    btn.style.background = '#22c55e';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.background = '';
    }, 2000);
  } catch (e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = currentUrl;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ 복사됨! Claude에 붙여넣기 하세요');
    saveHistory(currentUrl);
    renderHistory();
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function saveHistory(url) {
  history = [url, ...history.filter(u => u !== url)].slice(0, 5);
  localStorage.setItem('url_history', JSON.stringify(history));
}

function renderHistory() {
  if (history.length === 0) return;
  document.getElementById('historySection').style.display = 'block';
  document.getElementById('historyList').innerHTML = history.map(url => `
    <div class="history-item" onclick="applyUrl('${url.replace(/'/g, "\\'")}')">
      <div class="hi-dot"></div>
      <div class="hi-url">${url}</div>
      <div class="hi-copy">선택</div>
    </div>
  `).join('');
}

// Enter key
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') setUrl();
});

init();
</script>
</body>
</html>
